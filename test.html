<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Flies Shop</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}
body{background:#f5f5f5;}

/* NAV */
header{background:#0b3d2e;color:#fff;padding:15px;}
.nav{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:auto;}

/* LAYOUT */
.container{max-width:1200px;margin:auto;padding:20px;}
.shop-layout{display:flex;gap:20px;}
.sidebar{width:220px;}
.main-content{flex:1;}

/* PRODUCT LINKS (LEFT) */
.product-links{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.product-links button{
  padding:10px;
  background:#0b3d2e;
  color:#fff;
  border:none;
  border-radius:6px;
  text-align:left;
  cursor:pointer;
}
.product-links button:hover{background:#145c46;}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}
@media(max-width:768px){
  .shop-layout{flex-direction:column;}
  .product-links{flex-direction:row;overflow-x:auto;}
  .products{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{background:#fff;padding:10px;border-radius:10px;}
.card img{width:100%;height:180px;object-fit:cover;}
button{margin-top:5px;padding:8px;width:100%;cursor:pointer;}

</style>
</head>

<body>

<header>
  <div class="nav">
    <h2>Fishing Flies Shop</h2>
  </div>
</header>

<div class="container">
  <div class="shop-layout">

    <!-- LEFT -->
    <div class="sidebar">
      <div class="product-links" id="productLinks"></div>
    </div>

    <!-- RIGHT -->
    <div class="main-content">
      <h2>Products</h2><br>
      <div class="products" id="productList"></div>
    </div>

  </div>
</div>

<script>

const products = [
{ name:"Adams", image:"adams.jpg", price:3.5 },
{ name:"Blue Winged Olive (BWO)", image:"bwo.jpg", price:3.5 },
{ name:"Elk Hair Caddis", image:"caddis.jpg", price:3.5 },
{ name:"Royal Wulff", image:"royal.jpg", price:3.5 },
{ name:"Stimulator", image:"stimulator.jpg", price:3.5 }
];

const productList = document.getElementById("productList");
const productLinks = document.getElementById("productLinks");


// ✅ RENDER PRODUCTS
function renderProducts(list){
  productList.innerHTML = "";

  list.forEach(p=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>USD ${p.price}</p>
    `;

    productList.appendChild(card);
  });
}


// ✅ FILTER FUNCTION
function filterProducts(name){
  const filtered = products.filter(p => p.name === name);
  renderProducts(filtered);
}


// ✅ CREATE BUTTONS

// ALL BUTTON
const allBtn = document.createElement("button");
allBtn.innerText = "All Products";
allBtn.onclick = ()=> renderProducts(products);
productLinks.appendChild(allBtn);

// PRODUCT BUTTONS
products.forEach(p=>{
  const btn = document.createElement("button");
  btn.innerText = p.name;
  btn.onclick = ()=> filterProducts(p.name);
  productLinks.appendChild(btn);
});


// INIT
renderProducts(products);

</script>

</body>
</html>
